project:
  name: sprout
  
  # ADD THIS BLOCK: Tells Homebrew exactly which OpenJDK version to fetch
  java:
    version: 17
    
  description: Sprout CLI scaffolding tool
  longDescription: Sprout is a CLI tool for rapid project scaffolding.
  links:
    homepage: https://github.com/AmineSidki/sprout-releases
  authors:
    - Amine Sidki
  license: MIT
  copyright: "2026 Amine Sidki"

release:
  github:
    owner: AmineSidki
    name: sprout-releases
    overwrite: true

distributions:
  sprout:
    # MAGIC KEYWORD: Tells Homebrew & Scoop to manage the JVM for you
    type: JAVA_BINARY 
    
    # We define the main executable name inside the zip's bin/ folder
    executable:
      windowsExtension: bat
    
    artifacts:
      # ONLY ONE universal zip! No more OS-specific matrices.
      # This zip should just contain a `bin/sprout` script and a `lib/sprout.jar`
      - path: target/sprout-{{projectVersion}}.zip 

packagers:
  brew:
    # We no longer need multiPlatform: true because Java is cross-platform!
    active: ALWAYS
    repository:
      owner: AmineSidki
      name: homebrew-sprout
  scoop:
    active: ALWAYS
    repository:
      owner: AmineSidki
      name: scoop-sprout
