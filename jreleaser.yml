project:
  name: sprout
  java:
    version: 17
    groupId: org.AmineSidki
    artifactId: sprout
  description: Sprout CLI scaffolding tool
  longDescription: Sprout is a CLI tool for rapid project scaffolding.
  links:
    homepage: https://github.com/AmineSidki/sprout-releases
  authors:
    - Amine Sidki
  license: MIT
  copyright: "2026 Amine Sidki"

release:
  github:
    owner: AmineSidki
    name: sprout-releases
    overwrite: true

distributions:
  sprout:
    type: JAVA_BINARY 
    executable:
      windowsExtension: bat
    artifacts:
      # JReleaser will find this file in Sprout/target/
      - path: Sprout/target/sprout-{{projectVersion}}.zip 

packagers:
  brew:
    active: ALWAYS
    repository:
      owner: AmineSidki
      name: homebrew-sprout
  scoop:
    active: ALWAYS
    repository:
      owner: AmineSidki
      name: scoop-sprout
