project:
  name: sprout
  # We use a variable so JReleaser pulls the version from your Git Tag automatically
  description: Sprout CLI scaffolding tool
  longDescription: Sprout is a CLI tool for rapid project scaffolding.
  links:
    homepage: https://github.com/AmineSidki/sprout-releases
  authors:
    - Amine Sidki
  license: MIT
  copyright: "2026 Amine Sidki"

release:
  github:
    owner: AmineSidki
    name: sprout-releases
    overwrite: true

distributions:
  sprout:
    # Changed from JLINK to BINARY since Maven already did the heavy lifting
    type: BINARY
    artifacts:
      - path: Sprout/artifacts/sprout-linux-x86_64.tar.gz
        platform: linux-x86_64
      - path: Sprout/artifacts/sprout-osx-aarch_64.zip
        platform: osx-aarch_64
      - path: Sprout/artifacts/sprout-osx-x86_64.zip
        platform: osx-x86_64
      - path: Sprout/artifacts/sprout-windows-x86_64.zip
        platform: windows-x86_64

packagers:
  brew:
    multiPlatform: true
    active: ALWAYS
    repository:
      owner: AmineSidki
      name: homebrew-sprout
  scoop:
    active: ALWAYS
    repository:
      owner: AmineSidki
      name: scoop-sprout
