project:
  name: sprout
  description: Sprout CLI scaffolding tool
  links:
    homepage: https://github.com/AmineSidki/sprout-releases
  authors:
    - Amine Sidki
  license: MIT
  java:
    version: 17
  # Safety net to ensure it finds the .git folder
  gitRootSearch: true

release:
  github:
    owner: AmineSidki
    name: sprout-releases
    overwrite: true

distributions:
  sprout:
    type: JLINK
    artifacts:
      # We now point INTO the Sprout folder where the artifacts are downloaded
      - path: Sprout/artifacts/sprout-linux-x86_64.tar.gz
        platform: linux-x86_64
      - path: Sprout/artifacts/sprout-osx-x86_64.zip
        platform: osx-x86_64
      - path: Sprout/artifacts/sprout-windows-x86_64.zip
        platform: windows-x86_64

packagers:
  brew:
    active: ALWAYS
    repository:
      owner: AmineSidki
      name: homebrew-sprout
  scoop:
    active: ALWAYS
    repository:
      owner: AmineSidki
      name: scoop-sprout
