project:
  name: sprout
  description: Sprout CLI scaffolding tool
  website: https://github.com/AmineSidki/sprout-releases
  authors:
    - AmineSidki
  license: MIT
  java:
    version: 17

# 1. Where do the actual .zip and .tar.gz files go?
release:
  github:
    owner: AmineSidki
    name: sprout-releases
    overwrite: true

# 2. What files did our matrix build give us?
distributions:
  sprout:
    type: JLINK
    artifacts:
      - path: artifacts/sprout-linux-x86_64.tar.gz
        platform: linux-x86_64
      - path: artifacts/sprout-osx-x86_64.zip
        platform: osx-x86_64
      - path: artifacts/sprout-windows-x86_64.zip
        platform: windows-x86_64

# 3. Where do the package manager manifests go?
packagers:
  brew:
    active: ALWAYS
    tap:
      owner: AmineSidki
      name: homebrew-sprout
  scoop:
    active: ALWAYS
    bucket:
      owner: AmineSidki
      name: scoop-sprout
