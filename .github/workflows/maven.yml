name: Build release with CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v1.*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn -B package --file Sprout/pom.xml
      
    - name: Set release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
          files: |
            Sprout/target/*.jar 
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
