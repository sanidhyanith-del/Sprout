name: Release Sprout

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Package
        # This will now trigger the appassembler and assembly plugins in your pom.xml
        run: mvn clean package -DskipTests
        working-directory: ./Sprout

      - name: Run JReleaser
        uses: jreleaser/release-action@v2
        with:
          arguments: full-release -c jreleaser.yml --git-root-search
          version: '1.13.1'
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_PROJECT_VERSION: ${{ github.ref_name }}
