name: Release Sprout

on:
  push:
    tags:
      - 'v*' # Strictly limits runs to tags like v1.0.0, v1.1.2

jobs:
  build-and-package:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: sprout-linux-x86_64.tar.gz
            ext: tar.gz
          - os: macos-latest
            artifact_name: sprout-osx-x86_64.zip
            ext: zip
          - os: windows-latest
            artifact_name: sprout-windows-x86_64.zip
            ext: zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Matches your local environment for compress=2
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and jlink via Maven
        run: mvn clean package --file Sprout/pom.xml -DskipTests

        # Debug: Print the contents of target/ so we can see exactly what Maven built
      - name: List Target Directory
        shell: bash
        run: ls -la target/

      # Safely find and rename the Linux/macOS artifact
      - name: Rename Linux/macOS Artifact
        if: matrix.os != 'windows-latest'
        run: find target -maxdepth 1 -type f -name "*.${{ matrix.ext }}" -exec mv {} target/${{ matrix.artifact_name }} \;

      # Safely find and rename the Windows artifact
      - name: Rename Windows Artifact
        if: matrix.os == 'windows-latest'
        run: Get-ChildItem -Path target -Filter "*.zip" | Rename-Item -NewName "${{ matrix.artifact_name }}"

      # Upload the safely renamed artifacts
      - name: Upload OS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.artifact_name }}
          retention-days: 1
