name: Release Sprout

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-package:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # THIS IS THE MAGIC BULLET: Force all 'run' commands to execute inside the Sprout folder
    defaults:
      run:
        working-directory: ./Sprout 
        
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: sprout-linux-x86_64.tar.gz
            ext: tar.gz
          - os: macos-latest
            artifact_name: sprout-osx-x86_64.zip
            ext: zip
          - os: windows-latest
            artifact_name: sprout-windows-x86_64.zip
            ext: zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and jlink via Maven
        run: mvn clean package -DskipTests

      - name: Rename Linux/macOS Artifact
        if: matrix.os != 'windows-latest'
        run: find target -maxdepth 1 -type f -name "*.${{ matrix.ext }}" -exec mv {} target/${{ matrix.artifact_name }} \;

      - name: Rename Windows Artifact
        if: matrix.os == 'windows-latest'
        run: Get-ChildItem -Path target -Filter "*.zip" | Rename-Item -NewName "${{ matrix.artifact_name }}"

      - name: Upload OS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          # The upload action ignores the working-directory default, so we must explicitly tell it where to look
          path: Sprout/target/${{ matrix.artifact_name }} 
          retention-days: 1
